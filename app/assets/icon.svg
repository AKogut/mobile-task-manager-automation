<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cardShade" x1="212" y1="212" x2="812" y2="812" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EFF6FF" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Card -->
  <rect x="192" y="192" width="640" height="640" rx="144" fill="url(#cardShade)"/>

  <!-- Checkmark (blue, bold) -->
  <polyline
    points="318,524 454,672 706,356"
    stroke="#2563EB"
    stroke-width="92"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
