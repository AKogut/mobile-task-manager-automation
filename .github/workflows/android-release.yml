name: Android APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest

    env:
      APK_NAME: MobileTaskManager-debug.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build debug APK
        working-directory: app/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a,x86_64

      - name: Prepare APK asset
        run: |
          mkdir -p release-assets
          cp app/android/app/build/outputs/apk/debug/app-debug.apk "release-assets/${APK_NAME}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: release-assets/${{ env.APK_NAME }}

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/${{ env.APK_NAME }}
          generate_release_notes: true
